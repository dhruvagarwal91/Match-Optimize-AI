<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Match Optimize AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Arial, sans-serif; }
        body { 
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.9)), url('45883.png') center/cover no-repeat;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 40px;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }
        h2 { font-size: 1.5rem; margin-bottom: 25px; letter-spacing: 2px; text-transform: uppercase; }
        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            outline: none;
        }
        .login-btn {
            width: 100%;
            padding: 15px;
            background: white;
            color: black;
            border: none;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            text-decoration: none;
            display: block;
        }
        .footer-link {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #888;
        }
        a { color: #fff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Client Access</h2>
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">
        <a href="index.html" class="btn login-btn">Login</a>
        <div class="footer-link">
            <p>New here? <a href="#">Apply for Access</a></p>
        </div>
    </div>
</body>
</html>
